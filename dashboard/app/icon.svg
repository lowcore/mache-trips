<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <rect width="64" height="64" fill="#06080f"/>
  <!-- faint grid hint -->
  <g stroke="#2a6e8f" stroke-width="1" opacity="0.45">
    <line x1="0" y1="50" x2="64" y2="50"/>
    <line x1="0" y1="58" x2="64" y2="58"/>
    <line x1="10" y1="44" x2="2" y2="64"/>
    <line x1="32" y1="44" x2="32" y2="64"/>
    <line x1="54" y1="44" x2="62" y2="64"/>
  </g>
  <!-- glowing L -->
  <g fill="none" stroke="#6fd9ff" stroke-width="7">
    <path d="M22 10 V 44 H 40" filter="url(#glow)" opacity="0.85"/>
    <path d="M22 10 V 44 H 40"/>
  </g>
  <!-- orange cursor block -->
  <rect x="45" y="38" width="8" height="9" fill="#ff9f1c"/>
  <rect x="45" y="38" width="8" height="9" fill="#ff9f1c" filter="url(#glow)" opacity="0.7"/>
</svg>
